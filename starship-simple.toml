"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# Simple format - left prompt only with path and all enabled modules
format = "${custom.shortpath}$git_branch$character"

command_timeout = 5000

[custom.shortpath]
command = "world-nav shortpath --section full $PWD"
when = "true"
format = "[$output]($style) "
style = "cyan"
description = "Shortened path from world-nav"

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
